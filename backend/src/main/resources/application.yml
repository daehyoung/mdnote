spring:
  application:
    name: md-note
  datasource:
    url: jdbc:postgresql://localhost:5432/mdnote
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

file:
  upload-dir: /app/uploads

app:
  auth:
    # type: simple # Options: 'simple' (default) or 'jwt'
    type: jwt
  jwt:
    secret: thisIsASecretKeyThatIsLongEnoughForHS256AlgorithmToBeSecureAndSafeToUseForDevelopment
    expiration: 3600000 


springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
